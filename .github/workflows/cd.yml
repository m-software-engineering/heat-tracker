name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        id: build
        run: pnpm build

      - name: Publish with Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write release summary
        if: ${{ always() }}
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          CHANGESETS_OUTCOME: ${{ steps.changesets.outcome }}
          CHANGESETS_HAS_CHANGESETS: ${{ steps.changesets.outputs.hasChangesets }}
          CHANGESETS_PUBLISHED: ${{ steps.changesets.outputs.published }}
          CHANGESETS_PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/github-summary.mjs cd
