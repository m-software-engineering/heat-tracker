name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: matrix.node == 22
        run: pnpm exec playwright install --with-deps chromium
        timeout-minutes: 10

      - name: Run deterministic verification with E2E
        id: verify_e2e
        if: matrix.node == 22
        run: pnpm verify
        env:
          CI: "true"
          NODE_OPTIONS: "--enable-source-maps"

      - name: Run deterministic verification without E2E
        id: verify_non_e2e
        if: matrix.node == 24
        run: pnpm verify:non-e2e
        env:
          CI: "true"
          NODE_OPTIONS: "--enable-source-maps"

      - name: Write CI metadata
        if: ${{ always() }}
        env:
          NODE_VERSION: ${{ matrix.node }}
          VERIFY_E2E_OUTCOME: ${{ steps.verify_e2e.outcome }}
          VERIFY_NON_E2E_OUTCOME: ${{ steps.verify_non_e2e.outcome }}
        run: |
          mkdir -p ci-metadata
          if [ "$NODE_VERSION" = "22" ]; then
            COMMAND="pnpm verify"
            E2E="true"
            OUTCOME="$VERIFY_E2E_OUTCOME"
          else
            COMMAND="pnpm verify:non-e2e"
            E2E="false"
            OUTCOME="$VERIFY_NON_E2E_OUTCOME"
          fi
          if [ -z "$OUTCOME" ]; then
            OUTCOME="skipped"
          fi
          cat > "ci-metadata/node-${NODE_VERSION}.json" <<EOF
          {
            "node": "${NODE_VERSION}",
            "command": "${COMMAND}",
            "outcome": "${OUTCOME}",
            "e2e": "${E2E}"
          }
          EOF

      - name: Upload reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: reports-node-${{ matrix.node }}
          path: |
            ci-metadata
            packages/*/coverage
            playwright-report
            test-results
          retention-days: 30

  summary:
    name: Quality summary
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v6

      - name: Download verification artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: reports-node-*
          path: .github-summary-artifacts

      - name: Write quality summary
        if: ${{ always() }}
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: node scripts/github-summary.mjs ci --artifacts .github-summary-artifacts
