name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: matrix.node == 22
        run: pnpm exec playwright install --with-deps chromium
        timeout-minutes: 10

      - name: Run deterministic verification with E2E
        if: matrix.node == 22
        run: pnpm verify
        env:
          CI: "true"
          NODE_OPTIONS: "--enable-source-maps"

      - name: Run deterministic verification without E2E
        if: matrix.node == 24
        run: pnpm verify:non-e2e
        env:
          CI: "true"
          NODE_OPTIONS: "--enable-source-maps"

      - name: Upload reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: reports-node-${{ matrix.node }}
          path: |
            packages/*/coverage
            playwright-report
            test-results
          retention-days: 30
